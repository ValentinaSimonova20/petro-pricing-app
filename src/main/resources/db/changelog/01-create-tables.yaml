databaseChangeLog:
  - changeSet:
      id: 01-create-demand-forecast
      author: petri
      changes:
        - createTable:
            tableName: demand_forecast
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_demand_forecast
              - column:
                  name: row_id
                  type: INT
              - column:
                  name: period
                  type: DATE
              - column:
                  name: customer_asv
                  type: VARCHAR(64)
              - column:
                  name: customer
                  type: VARCHAR(255)
              - column:
                  name: mtr_nsi_code
                  type: VARCHAR(64)
              - column:
                  name: mtr_nsi_name
                  type: VARCHAR(255)
              - column:
                  name: contract
                  type: VARCHAR(64)
              - column:
                  name: currency
                  type: VARCHAR(16)
              - column:
                  name: forecast
                  type: "DECIMAL(38,10)"
              - column:
                  name: country
                  type: VARCHAR(255)
              - column:
                  name: region
                  type: VARCHAR(255)
              - column:
                  name: market
                  type: VARCHAR(255)
              - column:
                  name: client_id
                  type: VARCHAR(64)
              - column:
                  name: client_name
                  type: VARCHAR(255)

  - changeSet:
      id: 02-create-formula
      author: petri
      changes:
        - createTable:
            tableName: formula
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_formula
              - column:
                  name: formula_key
                  type: VARCHAR(128)
              - column:
                  name: formula_text
                  type: CLOB
              - column:
                  name: material_group_m
                  type: VARCHAR(128)
              - column:
                  name: business_partner
                  type: VARCHAR(64)
              - column:
                  name: valid_from
                  type: TIMESTAMP
              - column:
                  name: valid_to
                  type: DATE
              - column:
                  name: created_on
                  type: DATE
              - column:
                  name: inactive
                  type: VARCHAR(8)
              - column:
                  name: price_type
                  type: VARCHAR(16)
              - column:
                  name: currency_document
                  type: VARCHAR(16)
              - column:
                  name: material_code
                  type: VARCHAR(64)
              - column:
                  name: client_id
                  type: VARCHAR(64)
              - column:
                  name: client_name
                  type: VARCHAR(255)

  - changeSet:
      id: 03-create-formula-component
      author: petri
      changes:
        - createTable:
            tableName: formula_component
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_formula_component
              - column:
                  name: formula_key
                  type: VARCHAR(128)
              - column:
                  name: term_number
                  type: INT
              - column:
                  name: condition_type
                  type: VARCHAR(64)
              - column:
                  name: variable_name
                  type: VARCHAR(128)
              - column:
                  name: valid_from
                  type: TIMESTAMP
              - column:
                  name: valid_to
                  type: TIMESTAMP
              - column:
                  name: term_type_code
                  type: VARCHAR(16)
              - column:
                  name: value_amount
                  type: "DECIMAL(38,10)"
              - column:
                  name: term_currency
                  type: VARCHAR(16)
              - column:
                  name: quote_name
                  type: VARCHAR(255)
              - column:
                  name: quote_kind
                  type: VARCHAR(64)
              - column:
                  name: calc_rule
                  type: INT
              - column:
                  name: currency_period_rule_code
                  type: VARCHAR(32)
              - column:
                  name: currency_period_rule
                  type: VARCHAR(32)
              - column:
                  name: term_calc_kind
                  type: INT
              - column:
                  name: factor1
                  type: INT
              - column:
                  name: factor2
                  type: INT
              - column:
                  name: quote_origin
                  type: VARCHAR(32)

  - changeSet:
      id: 04-create-term-type
      author: petri
      changes:
        - createTable:
            tableName: term_type
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_term_type
              - column:
                  name: type_code
                  type: VARCHAR(16)
              - column:
                  name: type_label
                  type: VARCHAR(255)
              - column:
                  name: category
                  type: VARCHAR(64)
              - column:
                  name: fixed_term_kind
                  type: VARCHAR(64)
              - column:
                  name: description
                  type: VARCHAR(1024)
              - column:
                  name: value_source
                  type: VARCHAR(1024)

  - changeSet:
      id: 05-create-material-group
      author: petri
      changes:
        - createTable:
            tableName: material_group
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_material_group
              - column:
                  name: hname
                  type: VARCHAR(128)
              - column:
                  name: code_nsi
                  type: VARCHAR(64)
              - column:
                  name: v_mtr_name
                  type: VARCHAR(255)
              - column:
                  name: mtr_pf_name_lvl_2
                  type: VARCHAR(255)
              - column:
                  name: mtr_pf_name_lvl_3
                  type: VARCHAR(255)
              - column:
                  name: tlevel
                  type: VARCHAR(16)
              - column:
                  name: datuv
                  type: DATE
              - column:
                  name: datub
                  type: DATE
              - column:
                  name: leaf
                  type: VARCHAR(8)

  - changeSet:
      id: 06-create-quote-mapping
      author: petri
      changes:
        - createTable:
            tableName: quote_mapping
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_quote_mapping
              - column:
                  name: quote_origin
                  type: VARCHAR(32)
              - column:
                  name: quote_kind
                  type: VARCHAR(64)
              - column:
                  name: quote_name
                  type: VARCHAR(255)
              - column:
                  name: dl_id
                  type: VARCHAR(64)
              - column:
                  name: dl_id2
                  type: VARCHAR(64)
              - column:
                  name: quote_currency
                  type: VARCHAR(16)

  - changeSet:
      id: 07-create-quote-value
      author: petri
      changes:
        - createTable:
            tableName: quote_value
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_quote_value
              - column:
                  name: quote_type
                  type: VARCHAR(64)
              - column:
                  name: quote_name
                  type: VARCHAR(255)
              - column:
                  name: tech_quote_name
                  type: VARCHAR(255)
              - column:
                  name: quote_code
                  type: VARCHAR(64)
              - column:
                  name: quote_date
                  type: DATE
              - column:
                  name: quote_currency
                  type: VARCHAR(16)
              - column:
                  name: quote_val
                  type: "DECIMAL(38,10)"
              - column:
                  name: tech_load_ts
                  type: TIMESTAMP

  - changeSet:
      id: 08-create-currency-rate
      author: petri
      changes:
        - createTable:
            tableName: currency_rate
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_currency_rate
              - column:
                  name: version_type
                  type: VARCHAR(32)
              - column:
                  name: currency_name
                  type: VARCHAR(16)
              - column:
                  name: calmonth
                  type: VARCHAR(32)
              - column:
                  name: calday
                  type: DATE
              - column:
                  name: currency_value
                  type: "DECIMAL(38,10)"
